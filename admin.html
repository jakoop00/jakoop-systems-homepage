<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>لوحة تحكم Jakoop Tech</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Cairo', sans-serif; }
    .loader { border: 3px solid #f3f3f3; border-top: 3px solid #4f46e5; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 20px auto; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body class="bg-gray-100">
  <!-- Header -->
  <header class="bg-gradient-to-r from-indigo-600 to-purple-600 text-white p-6 shadow-lg">
    <div class="container mx-auto flex justify-between items-center">
      <h1 class="text-2xl font-bold">Jakoop Tech | لوحة التحكم</h1>
      <button id="logoutBtn" class="hidden bg-white/20 px-4 py-2 rounded-lg hover:bg-white/30">تسجيل خروج</button>
    </div>
  </header>

  <div class="container mx-auto p-8">
    
    <!-- Login Box -->
    <div id="loginBox" class="max-w-md mx-auto bg-white p-8 rounded-2xl shadow-xl mt-12">
      <div class="text-center mb-6">
        <div class="bg-indigo-100 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4">
          <svg class="w-8 h-8 text-indigo-600" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z" clip-rule="evenodd"></path></svg>
        </div>
        <h2 class="text-2xl font-bold text-gray-900">دخول الأدمن</h2>
        <p class="text-gray-600 mt-2">هاي الصفحة خاصة فيك بس</p>
      </div>
      <input type="password" id="adminPass" placeholder="كلمة السر" class="w-full p-4 border-2 border-gray-300 rounded-xl mb-4 focus:border-indigo-500 outline-none">
      <button onclick="checkPass()" class="w-full bg-indigo-600 text-white py-4 rounded-xl font-bold text-lg hover:bg-indigo-700 transition">دخول</button>
      <p id="loginError" class="text-red-600 mt-4 text-center font-bold"></p>
    </div>

    <!-- Messages Box -->
    <div id="messagesBox" class="hidden">
      <div class="flex justify-between items-center mb-8">
        <h2 class="text-3xl font-bold text-gray-900">رسائل العملاء</h2>
        <button onclick="loadMessages()" class="bg-green-600 text-white px-6 py-3 rounded-xl font-bold hover:bg-green-700 transition flex items-center gap-2">
          <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M4 2a1 1 0 011 1v2.101a7.002 7.002 0 0111.601 2.566 1 1 0 11-1.885.666A5.002 5.002 0 005.999 7H9a1 1 0 010 2H4a1 1 0 01-1-1V3a1 1 0 011-1zm.008 9.057a1 1 0 011.276.61A5.002 5.002 0 0014.001 13H11a1 1 0 110-2h5a1 1 0 011 1v5a1 1 0 11-2 0v-2.101a7.002 7.002 0 01-11.601-2.566 1 1 0 01.61-1.276z" clip-rule="evenodd"></path></svg>
          تحديث
        </button>
      </div>
      
      <div id="statsBox" class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
        <div class="bg-white p-6 rounded-xl shadow">
          <div class="text-gray-600 text-sm mb-1">إجمالي الرسائل</div>
          <div id="totalCount" class="text-3xl font-bold text-indigo-600">0</div>
        </div>
        <div class="bg-white p-6 rounded-xl shadow">
          <div class="text-gray-600 text-sm mb-1">رسائل اليوم</div>
          <div id="todayCount" class="text-3xl font-bold text-green-600">0</div>
        </div>
        <div class="bg-white p-6 rounded-xl shadow">
          <div class="text-gray-600 text-sm mb-1">آخر رسالة</div>
          <div id="lastMsgTime" class="text-lg font-bold text-gray-700">-</div>
        </div>
      </div>

      <div id="messagesList" class="space-y-4"></div>
      <div id="loadingMsg" class="loader hidden"></div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    // 1. حط الكونفق تبعك هون 👇 انسخه من Firebase Console
    const firebaseConfig = {
      apiKey: "AIzaSyDGt_nOFjCTQ02j7nX9HJC3CRGXG_29nf4",
      authDomain: "jakoop-tech-systems.firebaseapp.com",
      projectId: "jakoop-tech-systems",
      storageBucket: "jakoop-tech-systems.firebasestorage.app",
      messagingSenderId: "921354331810",
      appId: "1:921354331810:web:cfc6e7e0c0bd1c313ed9fb"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // 2. غيّر كلمة السر هاي لأي شي بدك إياه 👇
    const ADMIN_PASSWORD = "jakoop2026";

    window.checkPass = () => {
      const passInput = document.getElementById('adminPass');
      const errorMsg = document.getElementById('loginError');
      
      if(passInput.value === ADMIN_PASSWORD) {
        sessionStorage.setItem('jakoopAdmin', 'true');
        document.getElementById('loginBox').classList.add('hidden');
        document.getElementById('messagesBox').classList.remove('hidden');
        document.getElementById('logoutBtn').classList.remove('hidden');
        loadMessages();
      } else {
        errorMsg.textContent = 'كلمة السر غلط';
        passInput.value = '';
      }
    }

    // Auto login if session exists
    if(sessionStorage.getItem('jakoopAdmin') === 'true') {
      document.getElementById('loginBox').classList.add('hidden');
      document.getElementById('messagesBox').classList.remove('hidden');
      document.getElementById('logoutBtn').classList.remove('hidden');
      loadMessages();
    }

    // Logout
    document.getElementById('logoutBtn').addEventListener('click', () => {
      sessionStorage.removeItem('jakoopAdmin');
      location.reload();
    });

    // Load messages
    window.loadMessages = async () => {
      const list = document.getElementById('messagesList');
      const loading = document.getElementById('loadingMsg');
      list.innerHTML = '';
      loading.classList.remove('hidden');
      
      try {
        const q = query(collection(db, "contact_messages"), orderBy("createdAt", "desc"));
        const querySnapshot = await getDocs(q);
        
        let total = 0;
        let today = 0;
        const todayDate = new Date().toDateString();
        
        querySnapshot.forEach((doc) => {
          total++;
          const data = doc.data();
          const date = data.createdAt ? data.createdAt.toDate() : new Date();
          const dateStr = date.toLocaleString('ar-JO', { dateStyle: 'medium', timeStyle: 'short' });
          
          if(date.toDateString() === todayDate) today++;
          
          if(total === 1) document.getElementById('lastMsgTime').textContent = dateStr;
          
          list.innerHTML += `
            <div class="bg-white p-6 rounded-xl shadow hover:shadow-lg transition">
              <div class="flex justify-between items-start mb-3">
                <div>
                  <h3 class="font-bold text-xl text-gray-900">${data.name || 'بدون اسم'}</h3>
                  <p class="text-indigo-600 font-bold">📱 ${data.phone || 'لا يوجد'}</p>
                  ${data.email ? `<p class="text-gray-600 text-sm">✉️ ${data.email}</p>` : ''}
                  ${data.company ? `<p class="text-gray-600 text-sm">🏢 ${data.company}</p>` : ''}
                </div>
                <span class="text-sm text-gray-500 bg-gray-100 px-3 py-1 rounded-full">${dateStr}</span>
              </div>
              <div class="bg-gray-50 p-4 rounded-lg">
                <p class="text-gray-700 leading-relaxed">${data.message || 'لا يوجد رسالة'}</p>
              </div>
              <div class="mt-3 flex gap-2">
                <a href="https://wa.me/${data.phone?.replace(/[^0-9]/g, '')}" target="_blank" class="bg-green-500 text-white px-4 py-2 rounded-lg text-sm hover:bg-green-600">واتساب</a>
                <a href="tel:${data.phone}" class="bg-blue-500 text-white px-4 py-2 rounded-lg text-sm hover:bg-blue-600">اتصال</a>
              </div>
            </div>
          `;
        });
        
        document.getElementById('totalCount').textContent = total;
        document.getElementById('todayCount').textContent = today;
        
        if(total === 0) {
          list.innerHTML = '<div class="text-center text-gray-500 bg-white p-12 rounded-xl"><div class="text-6xl mb-4">📭</div><p class="text-xl">لا يوجد رسائل بعد</p></div>';
        }
        
      } catch (error) {
        console.error('Error:', error);
        list.innerHTML = '<div class="text-center text-red-600 bg-white p-8 rounded-xl">❌ صار خطأ بتحميل الرسائل</div>';
      } finally {
        loading.classList.add('hidden');
      }
    }

    // Enter key for login
    document.getElementById('adminPass').addEventListener('keypress', (e) => {
      if(e.key === 'Enter') checkPass();
    });
  </script>
</body>
</html>
